# 待办列表格式说明
# 每个任务包含以下字段：
#   id: 唯一标识（建议格式: 项目ID-序号，如 PROJA-001）
#   title: 可执行的任务标题（以动词开头）
#   category: 可选分类（setup | feature | fix | docs | test | review）
#   priority: high | medium | low
#   owner_role: 负责执行的角色（组合PM | 通用开发 | 评审调试 | 测试工程师）
#   status: ready | in-progress | blocked | done
#   estimate_hours: 预估工时
#   acceptance_criteria: 列表，每项应是可度量的
#   dependencies: 依赖的其他任务 id 列表

- id: PROJX-001
  title: 搭建本地开发环境
  category: setup
  priority: high
  owner_role: 通用开发
  status: ready
  estimate_hours: 4
  acceptance_criteria:
    - 本地应用可成功启动
    - 环境搭建步骤已写入 环境搭建.md
